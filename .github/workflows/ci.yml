name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-macos:
    name: Check (macOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos

      - name: Check workspace
        run: cargo check --workspace

      - name: Test workspace
        run: cargo test --workspace

  check-linux:
    name: Check (Linux)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libfontconfig1-dev \
            libasound2-dev

      - name: Check workspace
        run: cargo check --workspace

      - name: Test workspace
        run: cargo test --workspace

  check-windows:
    name: Check (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows

      - name: Check workspace
        run: cargo check --workspace

      - name: Test workspace
        run: cargo test --workspace
