name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  build-macos-arch:
    name: macOS build (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: macos-arm64
            runner: macos-15
          - target: x86_64-apple-darwin
            artifact: macos-x86_64
            runner: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          key: ${{ matrix.target }}

      - name: Install build dependencies
        run: cargo install cargo-bundle --locked

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Apply bundle version
        run: perl -0pi -e 's/^version = "[^"]+"/version = "$ENV{KNOTQ_VERSION}"/m' desktop/app/Cargo.toml
        env:
          KNOTQ_VERSION: ${{ steps.version.outputs.version }}

      - name: Bundle app
        run: cargo bundle --package knotq-app --release --target ${{ matrix.target }}

      - name: Upload unsigned app bundle
        run: |
          APP_PATH="target/${{ matrix.target }}/release/bundle/osx/KnotQ.app"
          test -d "$APP_PATH"
          mkdir -p dist/macos-build
          ditto -c -k --keepParent "$APP_PATH" "dist/macos-build/KnotQ-${{ matrix.artifact }}-unsigned.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnotQ-build-${{ matrix.artifact }}
          path: dist/macos-build/KnotQ-*-unsigned.zip

  package-macos:
    name: macOS package (${{ matrix.artifact }})
    runs-on: macos-15
    needs: [build-macos-arch]
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: macos-arm64
            arch: arm64
          - artifact: macos-x86_64
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS app bundles
        uses: actions/download-artifact@v4
        with:
          name: KnotQ-build-${{ matrix.artifact }}
          path: dist/macos-input

      - name: Unpack app bundles
        run: |
          mkdir -p "dist/macos-input/${{ matrix.arch }}"
          ditto -x -k "dist/macos-input/KnotQ-${{ matrix.artifact }}-unsigned.zip" "dist/macos-input/${{ matrix.arch }}"
          test -d "dist/macos-input/${{ matrix.arch }}/KnotQ.app"

      - name: Import macOS signing certificate
        run: |
          if [[ -z "${MACOS_CERTIFICATE_P12:-}" || -z "${MACOS_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "Skipping certificate import; MACOS_CERTIFICATE_P12 or MACOS_CERTIFICATE_PASSWORD is not set."
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/knotq-signing.keychain-db"

          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}

      - name: Sign, notarize, and package
        run: |
          bash bundling/macos/post-bundle.sh \
            "${KNOTQ_VERSION}" \
            "${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" \
            "${{ matrix.arch }}" \
            "dist/macos-input/${{ matrix.arch }}/KnotQ.app"
        env:
          KNOTQ_VERSION: ${{ steps.version.outputs.version }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          CODESIGN_ENTITLEMENTS: bundling/macos/KnotQ.entitlements
          APPLE_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.APPLE_NOTARY_KEYCHAIN_PROFILE }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          MACOS_PROVISIONING_PROFILE: ${{ secrets.MACOS_PROVISIONING_PROFILE }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnotQ-release-${{ matrix.artifact }}
          path: dist/macos/KnotQ-*.dmg

  build-windows:
    name: Windows
    runs-on: windows-latest
    environment: release-signing
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          key: windows-x86_64

      - name: Derive version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Apply version
        shell: bash
        run: perl -0pi -e 's/^version = "[^"]+"/version = "$ENV{KNOTQ_VERSION}"/m' desktop/app/Cargo.toml
        env:
          KNOTQ_VERSION: ${{ steps.version.outputs.version }}

      - name: Build
        run: cargo build --package knotq-app --release --target x86_64-pc-windows-msvc

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure PowerShell Gallery
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

      - name: Sign Windows app binary
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}
          files: ${{ github.workspace }}\target\x86_64-pc-windows-msvc\release\knotq.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: KnotQ
          description-url: https://github.com/${{ github.repository }}
          cache-dependencies: false

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Package Windows installer
        shell: pwsh
        run: ./bundling/windows/package-installer.ps1 "${{ steps.version.outputs.version }}" "x86_64-pc-windows-msvc"

      - name: Sign Windows installers
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\dist\windows
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: KnotQ Windows Installers
          description-url: https://github.com/${{ github.repository }}
          cache-dependencies: false

      - name: Verify Windows signatures
        shell: pwsh
        run: |
          $binary = "${{ github.workspace }}\target\x86_64-pc-windows-msvc\release\knotq.exe"
          $artifacts = @(
            $binary,
            "${{ github.workspace }}\dist\windows\KnotQ-${{ steps.version.outputs.version }}-windows-x64-setup.exe"
          )

          foreach ($file in $artifacts) {
            if (-not (Test-Path $file)) {
              throw "signed artifact not found: $file"
            }

            $signature = Get-AuthenticodeSignature -FilePath $file
            Write-Host "${file}: $($signature.Status)"
            if ($signature.Status -ne "Valid") {
              $signature | Format-List *
              throw "invalid Authenticode signature: $file"
            }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnotQ-release-windows-x64
          path: |
            dist/windows/KnotQ-*-setup.exe

  build-linux:
    name: Linux
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          key: linux-x86_64

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libfontconfig1-dev \
            libasound2-dev

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Apply version
        run: perl -0pi -e 's/^version = "[^"]+"/version = "$ENV{KNOTQ_VERSION}"/m' desktop/app/Cargo.toml
        env:
          KNOTQ_VERSION: ${{ steps.version.outputs.version }}

      - name: Build
        run: cargo build --package knotq-app --release --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p dist/linux/stage/assets dist/linux
          cp target/x86_64-unknown-linux-gnu/release/knotq dist/linux/stage/knotq
          cp -R desktop/app/assets/. dist/linux/stage/assets/
          find dist/linux/stage/assets -name .DS_Store -delete
          chmod +x dist/linux/stage/knotq
          tar czf "dist/linux/KnotQ-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz" \
            -C dist/linux/stage knotq assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KnotQ-release-linux-x86_64
          path: dist/linux/KnotQ-*.tar.gz

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs: [package-macos, build-windows, build-linux]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4
        with:
          pattern: KnotQ-release-*
          path: dist
          merge-multiple: true

      - name: Add Linux install script
        run: cp bundling/install.sh dist/install.sh

      - name: Generate checksums
        shell: bash
        run: |
          for file in dist/*; do
            [ -f "$file" ] || continue
            case "$file" in
              *.sha256) continue ;;
            esac
            sha256sum "$file" > "$file.sha256"
          done

      - uses: softprops/action-gh-release@v2
        with:
          name: KnotQ ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: dist/*
